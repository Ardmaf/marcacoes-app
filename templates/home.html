<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcações</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Inter',sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        background: radial-gradient(circle at top,#1b1b2a,#0b0b10);
        color:white;
    }

    .glass{
        width:100%;
        max-width:520px;
        padding:30px;
        border-radius:28px;
        background: rgba(255,255,255,0.06);
        backdrop-filter: blur(20px);
        border:1px solid rgba(255,255,255,0.1);
        box-shadow:0 20px 60px rgba(0,0,0,0.5);
        text-align:center;
        position:relative;
    }

    h1{font-size:28px;margin-bottom:8px;}
    p{opacity:0.6;margin-bottom:20px;font-size:14px;}

    input{
        width:100%;
        padding:16px;
        border-radius:18px;
        border:1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.05);
        color:white;
        text-align:center;
        outline:none;
    }

    button{
        width:100%;
        padding:16px;
        margin-top:12px;
        border:none;
        border-radius:18px;
        background: linear-gradient(135deg,#4f9cff,#6c5ce7);
        color:white;
        font-weight:600;
        cursor:pointer;
    }

    .dropdown{
        position:absolute;
        width:100%;
        background: rgba(20,20,30,0.95);
        border-radius:16px;
        margin-top:10px;
        max-height:300px;
        overflow:auto;
        text-align:left;
        display:none;
        border:1px solid rgba(255,255,255,0.1);
        z-index:10;
    }

    .group{
        padding:10px;
        font-size:12px;
        opacity:0.6;
        text-transform:uppercase;
    }

    .item{
        padding:10px;
        cursor:pointer;
    }

    .item:hover{
        background: rgba(255,255,255,0.08);
    }

</style>
</head>
<body>

<div class="glass">
    <h1>Marcações</h1>
    <p>Procura o teu profissional</p>

    <input id="search" placeholder="Escreve o nome do trabalhador..." oninput="filterWorkers()" autocomplete="off">
    <div class="dropdown" id="dropdown"></div>
    <button onclick="go()">Abrir</button>
</div>

<script>
// workers vindos do backend (slug + nome + profissão)
const workers = {{ workers|tojson }};

let selected = null;

function groupWorkers(list){
    const grouped = {};

    list.forEach(w => {
        if(!grouped[w.profession]) grouped[w.profession] = [];
        grouped[w.profession].push(w);
    });

    Object.keys(grouped).forEach(k => {
        grouped[k].sort((a,b)=>a.name.localeCompare(b.name));
    });

    return grouped;
}

function filterWorkers(){
    const q = document.getElementById('search').value.toLowerCase();
    const dropdown = document.getElementById('dropdown');
    dropdown.innerHTML = '';

    if(!q){
        dropdown.style.display='none';
        return;
    }

    const filtered = workers.filter(w => w.name.toLowerCase().includes(q));
    const grouped = groupWorkers(filtered);

    for(const prof in grouped){
        const g = document.createElement('div');
        g.className='group';
        g.innerText=prof;
        dropdown.appendChild(g);

        grouped[prof].forEach(w => {
            const item = document.createElement('div');
            item.className='item';
            item.innerText = w.name;
            item.onclick = () => {
                document.getElementById('search').value = w.slug;
                selected = w.slug;
                dropdown.style.display='none';
            };
            dropdown.appendChild(item);
        });
    }

    dropdown.style.display='block';
}

function go(){
    const val = document.getElementById('search').value.trim();
    if(val){
        window.location.href = '/' + val;
    }
}

</script>

</body>
</html>
