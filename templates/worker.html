<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ name }}</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top,#1b1b2a,#0b0b10);
    color: white;
    display: flex;
    justify-content: center;
    padding: 30px;
}

.container {
    max-width: 500px;
    width: 100%;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    padding: 25px;
}

h1 {text-align:center;}
.subtitle {text-align:center; opacity:.6; margin-bottom:20px;}

input, select {
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:12px;
    border:none;
    background: rgba(255,255,255,0.08);
    color:white;
}

.slot-grid {
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:10px;
    margin-top:15px;
}

.slot {
    padding:12px;
    text-align:center;
    border-radius:12px;
    cursor:pointer;
    background: rgba(255,255,255,0.08);
    transition:0.2s;
}

.slot:hover {transform:scale(1.05);}
.slot.selected {background: linear-gradient(135deg,#4f9cff,#6c5ce7);}
.slot.disabled {
    opacity:0.3;
    pointer-events:none;
}

button {
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background: linear-gradient(135deg,#4f9cff,#6c5ce7);
    color:white;
}

.loading {display:none; margin-top:10px;}
</style>
</head>

<body>

<div class="container">

<h1>{{ name }}</h1>
<div class="subtitle">Escolhe o teu horário</div>

<form id="form">

<input name="nome" placeholder="Nome" required>

<select name="servico">
<option>Corte</option>
<option>Barba</option>
<option>Corte + Barba</option>
</select>

<input type="date" id="date" name="date" value="{{ selected_date }}" required>

<div class="slot-grid" id="slots"></div>

<input type="hidden" name="time" id="time">

<div id="msg"></div>

<button type="submit">Confirmar</button>

<div class="loading" id="loading">A processar...</div>

</form>

</div>

<script>
let selected = null;
const slug = window.location.pathname.replace("/", "");

const ALL_SLOTS = [
"09:00","09:30","10:00","10:30",
"11:00","11:30","12:00","12:30",
"14:00","14:30","15:00","15:30",
"16:00","16:30","17:00"
];

// 🔥 carregar slots dinamicamente
async function loadSlots(){
    const date = document.getElementById("date").value;
    if(!date) return;

    const res = await fetch(`/api/slots/${slug}?date=${date}`);
    const data = await res.json();

    const container = document.getElementById("slots");
    container.innerHTML = "";

    ALL_SLOTS.forEach(slot => {
        const div = document.createElement("div");
        div.className = "slot";
        div.innerText = slot;

        if(!data.slots.includes(slot)){
            div.classList.add("disabled");
        } else {
            div.onclick = () => selectSlot(div, slot);
        }

        container.appendChild(div);
    });
}

// seleção com animação iOS
function selectSlot(el, value){
    document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');

    el.animate([
        {transform:"scale(1)"},
        {transform:"scale(1.15)"},
        {transform:"scale(1)"}
    ], {duration:200});

    selected = value;
    document.getElementById("time").value = value;
}

// mudar data → atualizar slots
document.getElementById("date").addEventListener("change", loadSlots);

// submit AJAX
document.getElementById("form").addEventListener("submit", async function(e){
    e.preventDefault();

    if(!selected){
        alert("Escolhe um horário");
        return;
    }

    const data = new FormData(e.target);

    document.getElementById("loading").style.display = "block";

    const res = await fetch(window.location.pathname, {
        method: "POST",
        body: data
    });

    const result = await res.json();

    document.getElementById("loading").style.display = "none";

    const msg = document.getElementById("msg");

    if(result.success){
        msg.innerHTML = "✅ Marcado!";
        msg.style.color = "#4ade80";
        loadSlots();
    } else {
        msg.innerHTML = "❌ " + result.error;
        msg.style.color = "#ff6b6b";
    }
});

// carregar ao abrir
loadSlots();
</script>

</body>
</html>
