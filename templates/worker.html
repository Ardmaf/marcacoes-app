<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ name }}</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: radial-gradient(circle at top,#0f172a,#020617);
    color:white;
}

.card{
    width:100%;
    max-width:520px;
    padding:28px;
    border-radius:28px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

h1{
    font-size:24px;
    margin-bottom:6px;
}

.subtitle{
    font-size:13px;
    opacity:0.6;
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color:white;
    outline:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:16px;
    background: linear-gradient(135deg,#4f9cff,#6c5ce7);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.02);
}

.slots{
    margin-top:15px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
}

.slot{
    padding:10px;
    border-radius:12px;
    background: rgba(255,255,255,0.06);
    text-align:center;
    cursor:pointer;
    font-size:13px;
}

.slot:hover{
    background: rgba(255,255,255,0.12);
}
</style>
</head>

<body>

<div class="card">

    <h1>{{ name }}</h1>
    <div class="subtitle">Escolhe o teu horário</div>

    <form method="POST">
        <input name="nome" placeholder="O teu nome" required>

        <select name="servico">
            <option>Corte</option>
            <option>Barba</option>
            <option>Corte + Barba</option>
        </select>

        <input type="date" name="date" required>

        <select name="time">
            {% for slot in slots %}
                <option value="{{ slot }}">{{ slot }}</option>
            {% endfor %}
        </select>

        <button type="submit">Confirmar marcação</button>
    </form>

    <div class="slots">
        {% for slot in slots %}
            <div class="slot">{{ slot }}</div>
        {% endfor %}
    </div>

</div>

</body>
</html>
