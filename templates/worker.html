<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ name }}</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 30px 15px;
    background: radial-gradient(circle at top,#1b1b2a,#0b0b10);
    color: white;
}

.container {
    width: 100%;
    max-width: 520px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border-radius: 28px;
    padding: 25px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

h1 {
    text-align: center;
    font-size: 26px;
}

.subtitle {
    text-align: center;
    opacity: 0.6;
    font-size: 13px;
    margin-bottom: 20px;
}

.item {
    padding: 12px;
    border-radius: 12px;
    transition: 0.2s;
}

.item:hover {
    background: rgba(255,255,255,0.1);
    transform: scale(1.02);
}
    
/* FORM */
input, select {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border-radius: 14px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: white;
    outline: none;
}

/* SLOTS */
.slot-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 15px;
}

.slot {
    padding: 12px;
    border-radius: 14px;
    text-align: center;
    background: rgba(255,255,255,0.08);
    cursor: pointer;
    transition: 0.2s;
    font-size: 14px;
}

.slot:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.15);
}

.slot.selected {
    background: linear-gradient(135deg,#4f9cff,#6c5ce7);
}

    
/* BUTTON */
button {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg,#4f9cff,#6c5ce7);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button:active {
    transform: scale(0.98);
}

/* LOADING */
.loading {
    display: none;
    text-align: center;
    margin-top: 10px;
    opacity: 0.6;
    font-size: 13px;
}

</style>
</head>

<body>

<div class="container">

    <h1>{{ name }}</h1>
    <div class="subtitle">Escolhe o teu horário</div>

    <form id="form">

        <input name="nome" placeholder="O teu nome" required>

        <select name="servico">
            <option>Corte</option>
            <option>Barba</option>
            <option>Corte + Barba</option>
        </select>

        <input type="date" name="date" value="{{ selected_date }}" required>

        <!-- SLOTS -->
        <div class="slot-grid" id="slots">
            {% for slot in slots %}
                <div class="slot" onclick="selectSlot(this, '{{ slot }}')">
                    {{ slot }}
                </div>
            {% endfor %}
        </div>

        <input type="hidden" name="time" id="time">

        <button type="submit">Confirmar marcação</button>

        <div id="msg" style="margin-top:10px;"></div>

        <div class="loading" id="loading">A processar marcação...</div>

    </form>

</div>

<script>
let selected = null;

function selectSlot(el, value){
    document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    selected = value;
    document.getElementById('time').value = value;
}

document.getElementById("form").addEventListener("submit", async function(e){
    e.preventDefault();

    if(!selected){
        alert("Escolhe um horário primeiro");
        return;
    }

    const form = e.target;
    const data = new FormData(form);

    document.getElementById("loading").style.display = "block";

    const res = await fetch(window.location.pathname, {
        method: "POST",
        body: data
    });

    const result = await res.json();

    const msg = document.getElementById("msg");

    document.getElementById("loading").style.display = "none";

    if(result.success){
        msg.innerHTML = "✅ Marcação feita com sucesso!";
        msg.style.color = "#4ade80";

        setTimeout(() => location.reload(), 1200);

    } else {
        msg.innerHTML = "❌ " + result.error;
        msg.style.color = "#ff6b6b";
    }
});
</script>

</body>
</html>
